services:
  type: web
  name: erevna-backend
  env: python
  buildCommand: pip install -r requirements.txt
  startCommand: python app.py
  envVars:
    # Database Configuration
    - key: NEON_DATABASE_URL
      sync: false
    # Flask Configuration
    - key: FLASK_ENV
      value: production
    - key: HOST
      value: 0.0.0.0
    - key: PORT
      value: 10000
    # JWT Configuration
    - key: JWT_SECRET_KEY
      generateValue: true
    # Gmail SMTP Configuration (FIXED - Try SSL Port 465)
    - key: MAIL_SERVER
      value: smtp.gmail.com
    - key: MAIL_PORT
      value: 465
    - key: MAIL_USE_TLS
      value: false
    - key: MAIL_USE_SSL
      value: true
    - key: MAIL_USERNAME
      sync: false
    - key: MAIL_PASSWORD
      sync: false
    - key: MAIL_DEFAULT_SENDER
      sync: false
    - key: MAIL_DEBUG
      value: true

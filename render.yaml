services:
  type: web
  name: erevna-backend
  env: python
  buildCommand: pip install -r requirements.txt
  startCommand: python app.py
  envVars:
    # Database Configuration
    - key: NEON_DATABASE_URL
      sync: false
    # Flask Configuration
    - key: FLASK_ENV
      value: production
    - key: HOST
      value: 0.0.0.0
    # Port Configuration (Render will set PORT automatically)
    - key: PORT
      value: 10000
    # JWT Configuration (Auto-generated)
    - key: JWT_SECRET_KEY
      generateValue: true
    # Email Configuration (Gmail SMTP)
    - key: MAIL_SERVER
      value: smtp.gmail.com
    - key: MAIL_PORT
      value: 587
    - key: MAIL_USE_TLS
      value: true
    - key: MAIL_USERNAME
      sync: false
    - key: MAIL_PASSWORD
      sync: false
    - key: MAIL_DEFAULT_SENDER
      sync: false

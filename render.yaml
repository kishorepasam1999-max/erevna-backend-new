services:
  type: web
  name: erevna-backend
  env: python
  buildCommand: pip install -r requirements.txt
  startCommand: python app.py
  envVars:
    - key: NEON_DATABASE_URL
      sync: false
    - key: JWT_SECRET_KEY
      generateValue: true
    - key: FLASK_ENV
      value: production
    - key: HOST
      value: 0.0.0.0
    - key: MAIL_SERVER
      value: smtp.gmail.com
    - key: MAIL_PORT
      value: 587
    - key: MAIL_USE_TLS
      value: true
    - key: MAIL_USERNAME
      sync: false
    - key: MAIL_PASSWORD
      sync: false
    - key: MAIL_DEFAULT_SENDER
      sync: false

services:
  type: web
  name: erevna-backend
  env: python
  buildCommand: pip install -r requirements.txt
  startCommand: python app.py
  envVars:
    # Database Configuration
    - key: NEON_DATABASE_URL
      sync: false
    # Flask Configuration
    - key: FLASK_ENV
      value: production
    - key: HOST
      value: 0.0.0.0
    - key: PORT
      value: 10000
    # JWT Configuration
    - key: JWT_SECRET_KEY
      generateValue: true
    # Brevo Email API (No Domain Required)
    - key: BREVO_API_KEY
      value: "xkeysib-YOUR_BREVO_API_KEY_HERE"
      sync: false
    # Gmail SMTP Configuration (Fallback)
    - key: MAIL_SERVER
      value: "smtp.gmail.com"
    - key: MAIL_PORT
      value: "587"
    - key: MAIL_USE_TLS
      value: "true"
    - key: MAIL_USE_SSL
      value: "false"
    - key: MAIL_USERNAME
      value: "21bq1a0569@gmail.com"
    - key: MAIL_PASSWORD
      value: "qjjmyzidywxxasbi"
      sync: false
    - key: MAIL_DEFAULT_SENDER
      value: "21bq1a0569@gmail.com"
    - key: MAIL_DEBUG
      value: "true"
    # Deployment trigger
    - key: DEPLOY_VERSION
      value: "2025-03-13-v8-api-fix"

services:
  type: web
  name: erevna-backend
  env: python
  buildCommand: pip install -r requirements.txt
  startCommand: python app.py
  envVars:
    # Database Configuration
    - key: NEON_DATABASE_URL
      sync: false
    # Flask Configuration
    - key: FLASK_ENV
      value: production
    - key: HOST
      value: 0.0.0.0
    - key: PORT
      value: 10000
    # JWT Configuration
    - key: JWT_SECRET_KEY
      generateValue: true
    # Resend Email API (Cloud-Friendly Solution)
    - key: RESEND_API_KEY
      value: "re_eRXuzFpX_BEmVf765HMZ7d4Udv1bULzun"
      sync: false
    # Deployment trigger
    - key: DEPLOY_VERSION
      value: "2025-03-11-v3"

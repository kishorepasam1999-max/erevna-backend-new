services:
  type: web
  name: erevna-backend
  env: python
  buildCommand: pip install -r requirements.txt
  startCommand: python app.py
  envVars:
    - key: NEON_DATABASE_URL
      sync: false
      value: ""  # Leave empty, set in dashboard
    - key: JWT_SECRET_KEY
      generateValue: true
    - key: FLASK_ENV
      value: production
    - key: HOST
      value: 0.0.0.0
